gui:
  nerdFontsVersion: "3"
  authorColors: {}
  branchColors: {}
  scrollHeight: 2
  scrollPastBottom: true
  mouseEvents: true
  skipDiscardChangeWarning: false
  skipStashWarning: false
  sidePanelWidth: 0.3333
  expandFocusedSidePanel: false
  mainPanelSplitMode: flexible
  language: auto
  commitLength:
    show: true
  skipNoStagedFilesWarning: false
  showListFooter: true
  showFileTree: true
  showRandomTip: true
  showCommandLog: true
  showBottomLine: true
  commandLogSize: 8
  splitDiff: auto
  animateExplosion: true
  theme:
    selectedLineBgColor:
      - "#311b92"

notARepository: prompt

git:
  # localBranchSortOrder: recency
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
      useConfig: false

keybinding:
  worktrees:
    viewWorktreeOptions: w
